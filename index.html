<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Slider</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: 'Segoe UI', sans-serif; }

  .slider-wrap {
    position: relative;
    width: 100%;
    overflow: hidden;
  }

  .slider-track {
    display: flex;
    transition: transform 0.5s ease;
  }

  .slide {
    min-width: 100%;
    position: relative;
  }

  /* Görsel */
  .slide img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Görselin üzerindeki karartma + içerik alanı */
  .slide-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 36px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .slide-text { color: #fff; }

  .slide-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .slide-desc {
    font-size: 13px;
    opacity: 0.85;
  }

  /* Buton */
  .slide-btn {
    display: inline-block;
    background: #fff;
    color: #111;
    padding: 11px 26px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .slide-btn:hover { opacity: 0.85; }

  /* Sol / Sağ oklar */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    z-index: 10;
    line-height: 1;
    transition: background 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.4); }
  .nav-prev { left: 14px; }
  .nav-next { right: 14px; }

  /* Alt nokta göstergeler */
  .dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 10px 0;
    background: #000;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #555;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active {
    background: #fff;
    transform: scale(1.3);
  }

  /* Mobil uyum */
  @media (max-width: 600px) {
    .slide-overlay { flex-direction: column; align-items: flex-start; padding: 16px 20px; }
    .slide-title { font-size: 15px; }
    .slide-btn { padding: 9px 18px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="slider-wrap" id="slider">
  <div class="slider-track" id="track">

    <!-- ============================================================ -->
    <!--  SLAYT 1 — Buradan düzenle                                  -->
    <!-- ============================================================ -->
    <div class="slide">
      <img src="GORSEL_1_URL_BURAYA" alt="Slayt 1" />
      <div class="slide-overlay">
        <div class="slide-text">
          <div class="slide-title">Başlık 1 Buraya</div>
          <div class="slide-desc">Alt açıklama metni buraya gelecek</div>
        </div>
        <a class="slide-btn" href="LINK_1_BURAYA">Hemen İncele →</a>
      </div>
    </div>

    <!-- ============================================================ -->
    <!--  SLAYT 2 — Buradan düzenle                                  -->
    <!-- ============================================================ -->
    <div class="slide">
      <img src="GORSEL_2_URL_BURAYA" alt="Slayt 2" />
      <div class="slide-overlay">
        <div class="slide-text">
          <div class="slide-title">Başlık 2 Buraya</div>
          <div class="slide-desc">Alt açıklama metni buraya gelecek</div>
        </div>
        <a class="slide-btn" href="LINK_2_BURAYA">Hemen İncele →</a>
      </div>
    </div>

    <!-- ============================================================ -->
    <!--  YENİ SLAYT EKLEMEK İÇİN: yukarıdaki bloğu kopyala,        -->
    <!--  GORSEL_ ve LINK_ kısımlarını değiştir,                     -->
    <!--  aşağıdaki "var toplamSlayt = 2" sayısını artır             -->
    <!-- ============================================================ -->

  </div>

  <button class="nav-btn nav-prev" onclick="git(-1)">&#8249;</button>
  <button class="nav-btn nav-next" onclick="git(1)">&#8250;</button>
</div>

<!-- Nokta göstergeler — slayt sayısı kadar <div class="dot"> ekle -->
<div class="dots" id="dots">
  <div class="dot active" onclick="gitTo(0)"></div>
  <div class="dot" onclick="gitTo(1)"></div>
</div>

<script>
  // -----------------------------------------------
  // Slayt sayısını buradan ayarla (kaç slayt varsa)
  var toplamSlayt = 2;
  // Otomatik geçiş süresi: milisaniye (4000 = 4 saniye)
  var gecisSuresi = 4000;
  // -----------------------------------------------

  var simdiki = 0;
  var track = document.getElementById('track');
  var dots = document.querySelectorAll('.dot');
  var timer;

  function guncelle() {
    track.style.transform = 'translateX(-' + simdiki * 100 + '%)';
    dots.forEach(function(d, i) {
      d.classList.toggle('active', i === simdiki);
    });
  }

  function git(yon) {
    simdiki = (simdiki + yon + toplamSlayt) % toplamSlayt;
    guncelle();
  }

  function gitTo(i) {
    simdiki = i;
    guncelle();
  }

  function otomatikBaslat() {
    timer = setInterval(function() { git(1); }, gecisSuresi);
  }

  // Üzerine gelinince otomatik geçişi durdur
  document.getElementById('slider').addEventListener('mouseenter', function() {
    clearInterval(timer);
  });
  document.getElementById('slider').addEventListener('mouseleave', function() {
    otomatikBaslat();
  });

  otomatikBaslat();
</script>

</body>
</html>
